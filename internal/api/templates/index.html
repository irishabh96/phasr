    >
      <div
        class="modal w-[min(540px,96vw)] border border-[#3E3431] rounded-lg overflow-hidden bg-panel-bg shadow-[0_12px_32px_rgba(0,0,0,0.28)]"
      >
        <div
          class="modal-head px-3 py-2.5 border-b border-[#312927] flex items-center justify-between gap-2 bg-[#1C1715]"
        >
          <h3 id="newTaskModalTitle" class="m-0 text-[15px] font-medium text-text-secondary">New Tab Task</h3>
          <button
            id="newTaskModalCloseBtn"
            class="btn-ghost bg-transparent border-border-default text-text-secondary p-2"
            type="button"
          >
            Close
          </button>
        </div>
        <div class="modal-body px-3 py-[13px] grid gap-3.5">
          <div class="workspace-modal-field grid gap-1">
            <label class="workspace-modal-label" for="newTaskModalPrompt">What task do you need to do?</label>
            <textarea
              id="newTaskModalPrompt"
              class="new-task-modal-textarea w-full min-h-[110px] max-h-[260px] px-3 py-2.5 rounded-md border-border-default bg-input-bg text-sm leading-[1.35] resize-y"
              placeholder="Describe the task for this new tab..."
            ></textarea>
            <div id="newTaskModalPromptHelp" class="workspace-modal-help min-h-[16px]" aria-live="polite"></div>
          </div>
          <div class="workspace-modal-field grid gap-1">
            <label class="workspace-modal-label" for="newTaskModalAgent">Which agent should run?</label>
            <select
              id="newTaskModalAgent"
              required
              class="new-task-modal-select w-full min-h-[42px] px-3 py-2.5 rounded-md border-border-default bg-input-bg text-sm leading-[1.2]"
            >
              <option value="" selected>Select agent</option>
              <option value="claude">claude</option>
              <option value="codex">codex</option>
              <option value="copilot">copilot</option>
              <option value="opencode">opencode</option>
              <option value="gemini">gemini</option>
            </select>
          </div>
          <div class="workspace-modal-field grid gap-1">
            <label class="workspace-modal-label" for="newTaskModalWorkspace"
              >Which workspace should this tab use?</label
            >
            <select
              id="newTaskModalWorkspace"
              class="new-task-modal-select w-full min-h-[42px] px-3 py-2.5 rounded-md border-border-default bg-input-bg text-sm leading-[1.2]"
            ></select>
          </div>
          <div id="newTaskModalError" class="workspace-modal-error hidden text-sm" role="alert"></div>
        </div>
        <div class="modal-foot px-3 py-2.5 pb-3 border-t border-[#312927] flex justify-end gap-2 bg-[#1C1715]">
          <button
            id="newTaskModalCancelBtn"
            class="btn-ghost workspace-modal-cancel-btn bg-transparent border-border-default text-text-secondary p-2"
            type="button"
          >
            Cancel
          </button>
          <button
            id="newTaskModalCreateBtn"
            class="btn-primary workspace-modal-create-btn new-task-modal-create-btn bg-[#2A2321] border-border-strong text-[#F2EBE4] font-semibold p-2 inline-flex items-center justify-center gap-2"
            type="button"
          >
            <span
              id="newTaskModalCreateSpinner"
              class="workspace-btn-spinner hidden w-3.5 h-3.5 rounded-full border-2 border-[#8F837A] border-t-[#F2EBE4]"
              aria-hidden="true"
            ></span>
            <span id="newTaskModalCreateLabel">Create Tab</span>
          </button>
        </div>
      </div>
    </div>

    <div
      id="newTabTypeModalBackdrop"
      class="modal-backdrop hidden fixed inset-0 bg-[rgba(12,9,8,0.72)] backdrop-blur-[2px] flex items-center justify-center z-[3120] p-3.5"
      role="dialog"
      aria-modal="true"
      aria-labelledby="newTabTypeModalTitle"
    >
      <div
        class="modal w-[min(460px,96vw)] border border-[#3E3431] rounded-lg overflow-hidden bg-panel-bg shadow-[0_12px_32px_rgba(0,0,0,0.28)]"
      >
        <div
          class="modal-head px-3 py-2.5 border-b border-[#312927] flex items-center justify-between gap-2 bg-[#1C1715]"
        >
          <h3 id="newTabTypeModalTitle" class="m-0 text-[15px] font-medium text-text-secondary">Open New Tab</h3>
          <button
            id="newTabTypeModalCloseBtn"
            class="btn-ghost bg-transparent border-border-default text-text-secondary p-2"
            type="button"
          >
            Close
          </button>
        </div>
        <div class="modal-body px-3 py-[13px] grid gap-3.5">
          <div class="new-tab-type-grid">
            <button id="newTabTypeTerminalBtn" class="new-tab-type-option" type="button">
              <span class="new-tab-type-title">Terminal</span>
              <span class="new-tab-type-desc">Open a shell tab in the workspace.</span>
            </button>
            <button id="newTabTypeTaskBtn" class="new-tab-type-option" type="button">
              <span class="new-tab-type-title">Existing Flow</span>
              <span class="new-tab-type-desc">Use the current New Tab Task form.</span>
            </button>
          </div>
        </div>
        <div class="modal-foot px-3 py-2.5 pb-3 border-t border-[#312927] flex justify-end gap-2 bg-[#1C1715]">
          <button
            id="newTabTypeModalCancelBtn"
            class="btn-ghost workspace-modal-cancel-btn bg-transparent border-border-default text-text-secondary p-2"
            type="button"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script src="/static/vendor/xterm/xterm.js"></script>
    <script src="/static/vendor/xterm/addon-fit.js"></script>
    <script src="/static/js/terminal_formatter.js"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>
