<svg width="1024" height="1024" viewBox="-96 -96 1216 1216" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="squircle">
      <path d="M512 0C158.2 0 0 158.2 0 512s158.2 512 512 512 512-158.2 512-512S865.8 0 512 0Z"/>
    </clipPath>

    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8EAAFF"/>
      <stop offset="50%" stop-color="#6B8CFF"/>
      <stop offset="100%" stop-color="#4F6EF7"/>
    </linearGradient>

    <radialGradient id="inner-glow" cx="0.35" cy="0.25" r="0.8">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="bar-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1a2a5c" flood-opacity="0.3"/>
    </filter>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="overlay" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg-gradient)"/>
    <rect width="1024" height="1024" fill="url(#inner-glow)"/>

    <path d="M512 4C160.4 4 4 160.4 4 512s156.4 508 508 508 508-156.4 508-508S863.6 4 512 4Z"
          stroke="white" stroke-width="2" stroke-opacity="0.12" fill="none"/>

    <g filter="url(#bar-shadow)">
      <rect
        x="224"
        y="320"
        width="256"
        height="512"
        rx="80"
        fill="white"
        opacity="0.30"
      />
      <rect
        x="232"
        y="328"
        width="240"
        height="200"
        rx="72"
        fill="white"
        opacity="0.06"
      />
    </g>

    <g filter="url(#bar-shadow)">
      <rect
        x="544"
        y="192"
        width="256"
        height="512"
        rx="80"
        fill="white"
        opacity="0.92"
      />
      <rect
        x="552"
        y="200"
        width="240"
        height="200"
        rx="72"
        fill="white"
        opacity="0.15"
      />
    </g>

    <line
      x1="480"
      y1="576"
      x2="544"
      y2="448"
      stroke="white"
      stroke-width="48"
      stroke-linecap="round"
      opacity="0.45"
    />

    <rect width="1024" height="1024" fill="url(#inner-glow)" opacity="0" />
  </g>

  <path d="M512 0C158.2 0 0 158.2 0 512s158.2 512 512 512 512-158.2 512-512S865.8 0 512 0Z"
        stroke="black" stroke-width="1" stroke-opacity="0.08" fill="none"/>
</svg>
